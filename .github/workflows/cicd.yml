name: CICD

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: [ubuntu-latest]
    steps:
      - name: checkout sourace
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Project
        run: mvn clean install -DskipTests
      - name: Log in to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tasktrackerapp:latest .
      - name: Publish Docker Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tasktrackerapp:latest

  deploy:
    needs: build
    runs-on: [aws-ec-task-tracker]
    steps:
      - name: Pull Docker Image from Docker Hub
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/tasktrackerapp:latest
      - name: Run Docker Container
        run: |
          docker stop tasktrackerapp || true
          docker rm tasktrackerapp || true
          docker run -d --name tasktrackerapp -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/tasktrackerapp:latest
