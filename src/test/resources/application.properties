# Test Configuration - Uses H2 in-memory database
spring.application.name=tasktrackerapp-test

# H2 Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# Disable JWT validation for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# AWS Cognito Configuration (Mock values for tests)
aws.cognito.region=us-east-1
aws.cognito.userPoolId=test-pool-id
aws.cognito.clientId=test-client-id
aws.cognito.clientSecret=test-client-secret
aws.accessKeyId=
aws.secretKey=

# Logging
logging.level.org.hibernate.SQL=WARN
logging.level.com.task.tracker=INFO
logging.level.org.springframework.security=WARN

